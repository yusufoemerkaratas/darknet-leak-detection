stages:
  - test
  - build
  - deploy

# ─── Global ───────────────────────────────────────────────────────────────────
default:
  image: python:3.14-slim
  before_script:
    - pip install --quiet --upgrade pip

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: $CI_REGISTRY_IMAGE/backend
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# ─── TEST ─────────────────────────────────────────────────────────────────────

# Collector unit tests (55 tests, no network needed)
test:collectors:
  stage: test
  script:
    - pip install --quiet -r requirements.txt
    - pip install --quiet pytest
    - pytest collectors/tests/test_collectors.py -v --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
    expire_in: 7 days

# Backend smoke test — verify FastAPI app and DB engine can be imported
test:backend:
  stage: test
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/testdb
  script:
    - pip install --quiet fastapi uvicorn sqlalchemy psycopg2-binary python-dotenv alembic
    - cd backend
    - python -c "from main import app; print('backend OK')"
    - python -c "from db import engine; print('db engine OK')"

# ─── BUILD ────────────────────────────────────────────────────────────────────

# Requires privileged mode in GitLab Runner config.toml:
#   [runners.docker]
#     privileged = true

build:backend:
  stage: build
  image: docker:24
  before_script: []
  services:
    - docker:24-dind
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG ./backend
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
        docker push $IMAGE_NAME:$IMAGE_TAG
        docker push $IMAGE_NAME:latest
      else
        echo "Feature branch — build OK, skipping push"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "feature/forum-collectors"

# ─── DEPLOY ───────────────────────────────────────────────────────────────────

# Manual trigger on main — SSH into server, pull latest image, restart backend
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd /opt/datenleck &&
        docker pull $IMAGE_NAME:latest &&
        docker compose -f backend/docker-compose.yml up -d --no-build backend
      "
  environment:
    name: production
    url: http://$DEPLOY_HOST:8000
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - build:backend
