# collectors/config/forums.yaml
#
# Forum konfigürasyonları.
# Kimlik bilgileri burada saklanmaz — sadece ${ENV_VAR} referansları kullanılır.
# Gerçek değerleri collectors/.env dosyasına koy (.env.example'dan kopyala).
#
# Pre-filter açıklaması:
#   pre_filter.keywords listesindeki kelimelerden biri başlık/içerikte geçiyorsa
#   o post "high_risk: true" olarak işaretlenir; boş liste = her şey high_risk.
#
# Captcha açıklaması:
#   account_generation.captcha: none | image | grid | math | slider
#   account_generation.captcha_config: CaptchaSolver'a geçirilen parametreler
#   captcha_config.ollama_model: Ollama'da yüklü vision modeli (örn. llava:34b)

forums:

  # ------------------------------------------------------------------
  # RansomHouse — React SPA, giriş gerektirmez, Playwright ile render
  # Collector tipi: spa  →  js_collector.SPALeakCollector
  # ------------------------------------------------------------------
  - id: ransomhouse
    name: "RansomHouse"
    enabled: true
    type: spa
    base_url: "http://zohlm7ahjwegcedoz7lrdrti7bvpofymcayotp744qhx6gjmxbuo2yid.onion"

    auth:
      type: none

    account_generation:
      enabled: false

    sections:
      - name: "Victims"
        url: "/"
        enabled: true

    # render tamamlandığında belirgin olan CSS selector
    wait_selector: "div.cls_record"

    selectors:
      post_item: "div.cls_record"
      title: ".cls_recordTop"
      body: ".cls_recordBottom"
      website: ".cls_recordMiddle"
      next_page: ""          # tek sayfa, sayfalama yok

    rate_limit:
      min_delay: 5.0
      max_delay: 12.0
      max_requests_per_hour: 40
      backoff_on_429: 120

    pre_filter:
      # RansomHouse kayıtlarındaki gerçek anahtar kelimeler
      # (her kayıtta Status/Action bulunuyor → tümü high_risk)
      keywords:
        - "encrypted"
        - "status"
        - "action"
        - "evidence"
        - "disclosed"
        - "sold"
        - "deadline"

  # ------------------------------------------------------------------
  - id: breachforums
    name: "BreachForums"
    enabled: true
    base_url: "http://breachforums3bc7dsc3wfp34dzjzlecsogfstfytndkpjqmam45gb5jyd.onion"
    clearnet_url: "https://breachforums.st"

    auth:
      type: form
      login_url: "/login"
      login_method: POST
      fields:
        username: "${BREACHFORUMS_USER}"
        password: "${BREACHFORUMS_PASS}"
        csrf_field: "csrf_token"
      success_indicator: "logout"
      session_cookie_name: "xf_session"
      cookie_file: "cookies/breachforums.json"
      session_ttl: 3600

    account_generation:
      enabled: true
      register_url: "/register"
      register_method: POST
      fields:
        username: "{generated_username}"
        password: "{generated_password}"
        email: "{generated_email}"
        agree_tos: "1"
      # image CAPTCHA — CaptchaSolver.solve(image_bytes, TEXT) kullanılır
      captcha: image
      captcha_config:
        ollama_model: "qwen3-vl:32b"           # Ollama'da yüklü model adı
        field_name: "captcha"           # POST form alanının adı
        image_selector: "img.captcha"  # Kayıt sayfasındaki CAPTCHA görseli
      credentials_file: "accounts/breachforums.json"

    sections:
      - name: "Databases & Leaks"
        url: "/Forum-Databases-Leaks"
        enabled: true
      - name: "Combolists"
        url: "/Forum-Combolists"
        enabled: true

    selectors:
      post_list: "div.structItem--thread"
      post_item: "div.structItem--thread"
      title: "div.structItem-title a[data-tp-primary]"
      author: "a.username"
      timestamp: "time[datetime]"
      timestamp_attr: "datetime"
      body: "div.bbWrapper"
      category: "ul.structItem-parts li a"
      next_page: "a.pageNavSimple-el--next"
      thread_body: "article.message-body div.bbWrapper"
      thread_author: "a.username--staff"
      reply_count: "dl.pairs--justified dd"

    rate_limit:
      min_delay: 2.0
      max_delay: 6.0
      max_requests_per_hour: 120
      backoff_on_429: 60

    # High-risk ön filtresi — bu kelimelerden biri geçen postlar öncelikli analiz için işaretlenir
    pre_filter:
      keywords:
        - "database"
        - "dump"
        - "breach"
        - "leak"
        - "combolist"
        - "password"
        - "credential"
        - "email"
        - "ssn"
        - "credit card"
        - "fullz"
        - "bank"
        - "government"
        - "healthcare"
        - "million"

  - id: xss_forum
    name: "XSS.is"
    enabled: true
    base_url: "http://xssforumv3isucukbxhdhwz67hoa5e2voakcfkuieq4ch257vsburuid.onion"
    clearnet_url: "https://xss.is"

    auth:
      type: form
      login_url: "/login"
      login_method: POST
      fields:
        login: "${XSSFORUM_USER}"
        password: "${XSSFORUM_PASS}"
        csrf_field: "_xfToken"
      success_indicator: "выход"
      session_cookie_name: "xf_session"
      cookie_file: "cookies/xss_forum.json"
      session_ttl: 7200

    account_generation:
      enabled: true
      register_url: "/register"
      register_method: POST
      fields:
        username: "{generated_username}"
        password: "{generated_password}"
        email: "{generated_email}"
        agree_tos: "1"
      # Math CAPTCHA — Rus forumlarında yaygın
      captcha: math
      captcha_config:
        ollama_model: "qwen3-vl:32b"
        field_name: "captcha_answer"
        expression_selector: ".captcha-math"
      credentials_file: "accounts/xss_forum.json"

    sections:
      - name: "Databases"
        url: "/forums/51/"
        enabled: true
      - name: "Leaks"
        url: "/forums/88/"
        enabled: true

    selectors:
      post_list: "div.structItem--thread"
      post_item: "div.structItem--thread"
      title: "div.structItem-title a"
      author: "a.username"
      timestamp: "time[datetime]"
      timestamp_attr: "datetime"
      body: "div.bbWrapper"
      category: "nav.breadcrumb span"
      next_page: "a.pageNavSimple-el--next"
      thread_body: "article.message-body div.bbWrapper"
      thread_author: "a.username"
      reply_count: "div.structItem-minor span"

    rate_limit:
      min_delay: 3.0
      max_delay: 8.0
      max_requests_per_hour: 90
      backoff_on_429: 90

    pre_filter:
      keywords:
        - "база"         # Rusça "database"
        - "дамп"         # Rusça "dump"
        - "утечка"       # Rusça "leak"
        - "database"
        - "dump"
        - "leak"
        - "combo"
        - "mail"
        - "pass"
        - "million"
        - "government"
        - "bank"

  - id: exploit_in
    name: "Exploit.in"
    enabled: true
    base_url: "http://exploitivzcm5dawzhe6c32f3zamswkpbu2vu3szfk2dcoq4qms2oad.onion"
    clearnet_url: "https://exploit.in"

    auth:
      type: form
      login_url: "/login"
      login_method: POST
      fields:
        login: "${EXPLOITIN_USER}"
        password: "${EXPLOITIN_PASS}"
        csrf_field: "csrf_token"
      success_indicator: "logout"
      session_cookie_name: "PHPSESSID"
      cookie_file: "cookies/exploit_in.json"
      session_ttl: 3600

    account_generation:
      enabled: false    # invite-only — kayıt kapalı
      credentials_file: "accounts/exploit_in.json"

    sections:
      - name: "Leaks"
        url: "/forum/91-leaks/"
        enabled: true
      - name: "Databases"
        url: "/forum/50-databases/"
        enabled: true

    selectors:
      post_list: "li.ipsDataItem"
      post_item: "li.ipsDataItem"
      title: "span.ipsType_break a"
      author: "a[hreflang]"
      timestamp: "time"
      timestamp_attr: "datetime"
      body: "div.ipsType_richText"
      category: "span.ipsType_light a"
      next_page: "li.ipsPagination_next a"
      thread_body: "div.ipsType_richText"
      thread_author: "a.ipsType_break"
      reply_count: "li.ipsPagination_last"

    rate_limit:
      min_delay: 4.0
      max_delay: 10.0
      max_requests_per_hour: 60
      backoff_on_429: 120

    pre_filter:
      keywords:
        - "database"
        - "leak"
        - "dump"
        - "exploit"
        - "vulnerability"
        - "breach"
        - "combo"
        - "fullz"
        - "million"
        - "corporate"
        - "government"

defaults:
  request_timeout: 30
  max_retries: 3
  # Her 50 istekte bir Tor devresi yenilenir (TorManager._tick ile)
  rotate_circuit_every: 50
  user_agent_rotate: true
  respect_robots_txt: false
  max_pages_per_section: 10
  storage_dir: "raw_storage"
