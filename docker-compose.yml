services:
  db:
    image: postgres:15
    container_name: datenleck_postgres
    restart: always
    environment:
      POSTGRES_DB: datenleck_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datenleck_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: datenleck_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "62001:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:password@db:5432/datenleck_db
    env_file:
      - .env
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: datenleck_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "62000:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173

  tor:
    build: ./tor
    container_name: datenleck_tor
    restart: always
    ports:
      - "9052:9050"
      - "9053:9051"

  collector:
    build:
      context: .
      dockerfile: collectors/Dockerfile
    container_name: datenleck_collector
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      tor:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:password@db:5432/datenleck_db
      TOR_HOST: tor
      TOR_SOCKS_PORT: 9050
      TOR_CONTROL_PORT: 9051
      TOR_CONTROL_PASSWORD: datenleck2024
      # SSH tunnel command for OLLAMA_URL: see collectors/.env (-g flag required)
      OLLAMA_URL: http://host-gateway:9999
      # Moondream 2 VLM fallback for CAPTCHA solving (local model)
      MOONDREAM_MODEL: ${MOONDREAM_MODEL:-vikhyatk/moondream2}
      MOONDREAM_DEVICE: ${MOONDREAM_DEVICE:-cpu}
      # HuggingFace cache inside container
      HF_HOME: /app/.cache/huggingface
    env_file:
      - .env
    volumes:
      - ./collectors/config:/app/collectors/config
      - collector_raw:/app/collectors/raw_storage
      - collector_processed:/app/collectors/processed_storage
      - collector_failed:/app/collectors/failed_storage
      - huggingface_cache:/app/.cache/huggingface
    extra_hosts:
      - "host-gateway:host-gateway"

volumes:
  postgres_data:
  collector_raw:
  collector_processed:
  collector_failed:
  huggingface_cache:    # Moondream model cache (persisted across restarts)
